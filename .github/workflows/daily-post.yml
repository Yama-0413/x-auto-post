name: Daily X Post

# 考察プール(posts.json)から毎日1本、無人で自動投稿（フルオート・PC非依存）
on:
  schedule:
    - cron: '0 12 * * *'   # 毎日 12:00 UTC = 21:00 JST
  workflow_dispatch:        # 手動実行（テスト用）

permissions:
  contents: write           # posted フラグを書き戻すため

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests requests-oauthlib
      - name: Post next from queue
        env:
          X_CONSUMER_KEY: ${{ secrets.X_CONSUMER_KEY }}
          X_CONSUMER_SECRET: ${{ secrets.X_CONSUMER_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: python post_queue.py
      - name: Commit queue state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts.json
          git commit -m "chore: mark posted [skip ci]" || echo "no changes to commit"
          git push
